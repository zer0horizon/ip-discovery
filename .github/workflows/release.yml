name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Job 1: Build native Node.js binaries for all platforms
  build-node-bindings:
    name: Build Node Bindings - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: npm ci
        working-directory: node

      - name: Build bindings
        run: npx napi build --release --platform --target ${{ matrix.settings.target }}
        working-directory: node

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: node/*.node
          if-no-files-found: error

  # Job 2: Publish packages to Crates.io and npm
  publish:
    name: Publish Releases
    needs: build-node-bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # Download all pre-compiled native binaries
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: node/artifacts

      # Move downloaded artifacts to node/ folder (where npm publish expects them)
      - name: Move artifacts to build directory
        run: |
          find node/artifacts -name "*.node" -exec mv {} node/ \;
          rm -rf node/artifacts

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 1. Publish to Crates.io
      - name: Publish to Crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --package ip-discovery
          echo "Waiting 30 seconds for crates.io to index the library..."
          sleep 30
          cargo publish --package ipd

      # 2. Publish to npm
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd node
          npm publish --access public
